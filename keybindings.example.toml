# AiTUI Keybindings Configuration
# Copy this file to ~/.config/aitui/keybindings.toml and customize.
# Only include the bindings you want to override; defaults are used for the rest.
#
# Key format:
#   Single character:  "j", "q", "G"
#   Modifier keys:     "Ctrl+c", "Ctrl+w", "Alt+x"
#   Function keys:     "F1" ~ "F12"
#   Special keys:      "Enter", "Esc", "Tab", "Backspace", "Delete",
#                      "Up", "Down", "Left", "Right", "Home", "End", "Space"
#
# A single key:        quit = "q"
# Multiple keys:       scroll_down = ["j", "Down"]

